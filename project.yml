name: UpTimePrizes
options:
  bundleIdPrefix: com.uptimeprizes
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  UpTimePrizes:
    type: application
    platform: iOS
    sources:
      - path: UpTimePrizes
        excludes:
          - "Resources/Audio/**"
    resources:
      - path: UpTimePrizes/Resources/Assets.xcassets
      - path: UpTimePrizes/Resources/Audio
        buildPhase: resources
      - path: UpTimePrizes/Resources/Fonts
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uptimeprizes.app
        INFOPLIST_KEY_CFBundleDisplayName: "UpTime Prizes"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    entitlements:
      path: UpTimePrizes/UpTimePrizes.entitlements
      properties:
        com.apple.developer.in-app-payments: []
    info:
      path: UpTimePrizes/Info.plist
      properties:
        UIBackgroundModes:
          - audio
          - fetch
        UIAppFonts:
          - PlayfairDisplay-Regular.ttf
          - PlayfairDisplay-SemiBold.ttf
