workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic App Manager
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.uptimeprizes.app
      vars:
        XCODE_WORKSPACE: "UpTimePrizes.xcodeproj/project.xcworkspace"
        XCODE_SCHEME: "UpTimePrizes"
        APP_STORE_APPLE_ID: "com.uptimeprizes.app"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Set build number
        script: |
          # Use Codemagic's BUILD_NUMBER (auto-increments each build) offset by 100
          # so we stay well above any previously uploaded version
          BUILD_NUM=$((BUILD_NUMBER + 100))
          echo "Setting CURRENT_PROJECT_VERSION to $BUILD_NUM"
          # Patch project.yml before XcodeGen runs
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml
          cat project.yml | grep CURRENT_PROJECT_VERSION
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "UpTimePrizes.xcodeproj/project.xcworkspace" \
            --scheme "UpTimePrizes"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
